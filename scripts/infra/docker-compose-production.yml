x-logging-options: &aws-logging-options
  awslogs-region: eu-west-1
  awslogs-group: agora-prod-docker

services:
  api:
    container_name: agora_api
    image: quay.io/zkorum/agora-api:4.0.2
    environment:
      CONNECTION_STRING: "postgres://postgres:CHANGEME@postgres:5432/agora"
      CORS_ORIGIN_LIST: "https://www.agoracitizen.network,https://agoracitizen.network,https://agoracitizen.app,https://www.agoracitizen.app"
      PEPPERS: "fmgXvsChQsx9fAlq0DPiVg=="
      NODE_ENV: "production"
      VERIFICATOR_SVC_BASE_URL: "http://verificator-svc:8000"
      REACHER_BASE_URL: "http://reacher:8080"
      TWILIO_ACCOUNT_SID: "CHANGEME"
      TWILIO_AUTH_TOKEN: "CHANGEME"
      TWILIO_SERVICE_SID: "CHANGEME"
      SERVER_DID_PROD: "did:web:agoracitizen.app"
      GOOGLE_APPLICATION_CREDENTIALS: "/secrets/service-account.json"
      # MaxDiff GitHub integration
      IS_MAXDIFF_GITHUB_ORG_ONLY: "true"
      MAXDIFF_GITHUB_ALLOWED_ORGS: "Agora"
      GITHUB_WEBHOOK_SECRET: "CHANGEME"
      GITHUB_ACCESS_TOKEN: "CHANGEME"
    volumes:
      - ./<name of service account>.json:/secrets/service-account.json:ro
    expose:
      - "8080"
    restart: unless-stopped
  scoring-worker:
    container_name: agora_scoring_worker
    image: quay.io/zkorum/agora-scoring-worker:1.0.0
    environment:
      SCORING_WORKER_CONNECTION_STRING: "postgres://postgres:CHANGEME@postgres:5432/agora"
      SCORING_WORKER_CONNECTION_STRING_READ: "postgres://postgres:CHANGEME@postgres-replica:5432/agora"
      SCORING_WORKER_VALKEY_URL: "valkey://valkey:6379"
      SCORING_WORKER_POLL_INTERVAL_SECONDS: "2"
      SCORING_WORKER_BATCH_SIZE: "50"
      SCORING_WORKER_RECONCILE_INTERVAL_SECONDS: "300"
    stop_grace_period: 10m
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        <<: *aws-logging-options
        awslogs-stream: scoring-worker
  import-worker:
    container_name: agora_import_worker
    image: quay.io/zkorum/agora-import-worker:latest
    environment:
      IMPORT_WORKER_CONNECTION_STRING: "postgres://postgres:CHANGEME@postgres:5432/agora"
      IMPORT_WORKER_CONNECTION_STRING_READ: "postgres://postgres:CHANGEME@postgres-replica:5432/agora"
      IMPORT_WORKER_VALKEY_URL: "valkey://valkey:6379"
    stop_grace_period: 10m
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        <<: *aws-logging-options
        awslogs-stream: import-worker
  math-updater:
    container_name: agora_math_updater
    image: quay.io/zkorum/agora-math-updater:2.0.3
    environment:
      MATH_UPDATER_CONNECTION_STRING: "postgres://postgres:CHANGEME@postgres:5432/agora"
      MATH_UPDATER_CONNECTION_STRING_READ: "postgres://postgres:CHANGEME@postgres-replica:5432/agora"
      MATH_UPDATER_VALKEY_URL: "valkey://valkey:6379"
      # The main worker owns red-dwarf analysis and immediate AI-description first pass.
      # Retry workers below only process retry/backlog queues.
      MATH_UPDATER_GOOGLE_APPLICATION_CREDENTIALS: "/secrets/service-account.json"
    volumes:
      - ./<name of service account>.json:/secrets/service-account.json:ro
    stop_grace_period: 10m
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        <<: *aws-logging-options
        awslogs-stream: math-updater
  ai-description-retry-worker:
    container_name: agora_ai_description_retry_worker
    image: quay.io/zkorum/agora-ai-description-retry-worker:1.0.0
    environment:
      AI_DESCRIPTION_RETRY_WORKER_CONNECTION_STRING: "postgres://postgres:CHANGEME@postgres:5432/agora"
      AI_DESCRIPTION_RETRY_WORKER_CONNECTION_STRING_READ: "postgres://postgres:CHANGEME@postgres-replica:5432/agora"
      AI_DESCRIPTION_RETRY_WORKER_VALKEY_URL: "valkey://valkey:6379"
      AI_DESCRIPTION_RETRY_WORKER_AWS_AI_LABEL_SUMMARY_READ_TIMEOUT_SECONDS: "60.0"
    stop_grace_period: 10m
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        <<: *aws-logging-options
        awslogs-stream: ai-description-retry-worker
  description-translation-retry-worker:
    container_name: agora_description_translation_retry_worker
    image: quay.io/zkorum/agora-description-translation-retry-worker:1.0.0
    environment:
      DESCRIPTION_TRANSLATION_RETRY_WORKER_CONNECTION_STRING: "postgres://postgres:CHANGEME@postgres:5432/agora"
      DESCRIPTION_TRANSLATION_RETRY_WORKER_CONNECTION_STRING_READ: "postgres://postgres:CHANGEME@postgres-replica:5432/agora"
      DESCRIPTION_TRANSLATION_RETRY_WORKER_VALKEY_URL: "valkey://valkey:6379"
      DESCRIPTION_TRANSLATION_RETRY_WORKER_AWS_DESCRIPTION_TRANSLATION_READ_TIMEOUT_SECONDS: "60.0"
      DESCRIPTION_TRANSLATION_RETRY_WORKER_GOOGLE_APPLICATION_CREDENTIALS: "/secrets/service-account.json"
    volumes:
      - ./<name of service account>.json:/secrets/service-account.json:ro
    stop_grace_period: 10m
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        <<: *aws-logging-options
        awslogs-stream: description-translation-retry-worker
  content-translation-worker:
    container_name: agora_content_translation_worker
    image: quay.io/zkorum/agora-content-translation-worker:1.0.0
    environment:
      CONTENT_TRANSLATION_WORKER_CONNECTION_STRING: "postgres://postgres:CHANGEME@postgres:5432/agora"
      CONTENT_TRANSLATION_WORKER_CONNECTION_STRING_READ: "postgres://postgres:CHANGEME@postgres-replica:5432/agora"
      CONTENT_TRANSLATION_WORKER_VALKEY_URL: "valkey://valkey:6379"
      CONTENT_TRANSLATION_WORKER_TRANSLATION_PROVIDER: "google"
      CONTENT_TRANSLATION_WORKER_GOOGLE_CLOUD_PROJECT_ID: "CHANGEME"
      CONTENT_TRANSLATION_WORKER_GOOGLE_CLOUD_TRANSLATION_ENDPOINT: "translation.googleapis.com"
      CONTENT_TRANSLATION_WORKER_GOOGLE_CLOUD_TRANSLATION_LOCATION: "us-central1"
      CONTENT_TRANSLATION_WORKER_GOOGLE_CLOUD_TRANSLATION_MODEL: "general/translation-llm"
      CONTENT_TRANSLATION_WORKER_GOOGLE_APPLICATION_CREDENTIALS: "/secrets/service-account.json"
    volumes:
      - ./<name of service account>.json:/secrets/service-account.json:ro
    stop_grace_period: 10m
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        <<: *aws-logging-options
        awslogs-stream: content-translation-worker
  reacher:
    container_name: reacher
    image: reacherhq/backend:latest
    environment:
      RCH__HTTP_HOST: "0.0.0.0"
      RCH__FROM_EMAIL: "noreply@probe.agoracitizen.network"
      RCH__HELLO_NAME: "probe.agoracitizen.network"
      RCH__SMTP_TIMEOUT: "5"
      RUST_LOG: "reacher=info"
    expose:
      - "8080"
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        <<: *aws-logging-options
        awslogs-stream: reacher
  verificator-svc:
    container_name: verificator_svc
    image: ghcr.io/rarimo/verificator-svc:v0.2.13
    command: run service
    environment:
      KV_VIPER_FILE: "/config/config.yaml"
    volumes:
      - /home/ec2-user/rarimo:/config
    expose:
      - "8000"
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        <<: *aws-logging-options
        awslogs-stream: verificator-svc
  app:
    container_name: agora_app
    image: quay.io/zkorum/agora-app-production:4.0.1
    volumes:
      - agora-assets:/usr/share/nginx/html/assets
    expose:
      - "80"
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        <<: *aws-logging-options
        awslogs-stream: app
  nginx:
    image: nginx:stable-alpine
    container_name: agora_nginx
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
      - 8443:8443
    volumes:
      #  - ./nginx.conf:/etc/nginx/nginx.conf
      - ./vhosts:/etc/nginx/conf.d
      - ./certbot/www/:/var/www/certbot/:ro
      - ./certbot/conf/:/etc/nginx/ssl/:ro
      - /var/log/nginx:/var/log/nginx/
    logging:
      driver: awslogs
      options:
        <<: *aws-logging-options
        awslogs-stream: nginx
  certbot:
    image: certbot/certbot:latest
    command: certonly --webroot --webroot-path=/var/www/certbot/ --email admin@zkorum.com --agree-tos --no-eff-email -d agoracitizen.network
    volumes:
      - ./certbot/www/:/var/www/certbot/:rw
      - ./certbot/conf/:/etc/letsencrypt/:rw
      - ./certbot/logs:/var/log/letsencrypt
    restart: unless-stopped

volumes:
  agora-assets:
