# taraaz.jomhoor.org — Agora deliberation platform
# For civic-nginx Docker container (uses container names, not localhost)
# Copy to: /opt/civic-compass/nginx/conf.d/taraaz.conf

# Detect social-media crawlers and OG validators for preview routing
map $http_user_agent $is_og_bot {
    default                     0;
    # Social platforms
    ~*facebookexternalhit       1;
    ~*Twitterbot                1;
    ~*LinkedInBot               1;
    ~*WhatsApp                  1;
    ~*TelegramBot               1;
    ~*Slackbot                  1;
    ~*Discordbot                1;
    # Search engines
    ~*Googlebot                 1;
    ~*bingbot                   1;
    ~*YandexBot                 1;
    ~*Baiduspider               1;
    # OG validators & preview tools
    ~*opengraph                 1;
    ~*metatags                  1;
    ~*Orca                      1;
    ~*preview                   1;
    ~*HeadlessChrome            1;
    ~*Lighthouse                1;
    ~*PaperLiBot                1;
    ~*Embedly                   1;
    ~*Iframely                  1;
    ~*outbrain                  1;
    ~*Applebot                  1;
    ~*Pinterestbot              1;
    ~*Rogerbot                  1;
    ~*Screaming.Frog            1;
    # Generic catch-all for bots/crawlers
    ~*[Bb]ot                    1;
    ~*[Cc]rawl                  1;
    ~*[Ss]pider                 1;
    ~*[Ss]craper                1;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name taraaz.jomhoor.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name taraaz.jomhoor.org;

    ssl_certificate     /etc/letsencrypt/live/taraaz.jomhoor.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taraaz.jomhoor.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:TARAAZ_SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Use Docker embedded DNS for runtime resolution
    resolver 127.0.0.11 valid=10s;

    # Verificator (ZK proof verification via Rarimo)
    location /integrations/verificator-svc {
        set $verificator_upstream http://agora-verificator:8000;
        proxy_pass $verificator_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Backend API
    location /api {
        set $api_upstream http://agora-api:8080;
        client_max_body_size 150M;
        proxy_pass $api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # OG endpoint — proxied to Fastify API (matched by bot rewrite below)
    location /og/ {
        set $og_upstream http://agora-api:8080;
        proxy_pass $og_upstream$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
        proxy_buffering off;
    }

    # Conversation URLs — always serve OG tags, then meta-refresh to SPA.
    # This ensures ALL clients (validators, bots, browsers) see the OG tags.
    # Browsers instantly redirect via <meta http-equiv="refresh" content="0">.
    location ~ ^/conversation/([a-zA-Z0-9]+) {
        set $convo_slug $1;
        rewrite ^ /og/conversation/$convo_slug last;
    }

    # Frontend SPA — serve at root
    location / {
        set $app_upstream http://agora-app:80;
        proxy_pass $app_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Keep /feed/ working for backward compat (same app, no rewrite needed)
    location /feed/ {
        set $feed_upstream http://agora-app:80;
        rewrite ^/feed/(.*)$ /$1 break;
        proxy_pass $feed_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Health check
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
