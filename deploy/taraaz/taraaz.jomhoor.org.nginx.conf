# ------------------------------------------------------------------
# taraaz.jomhoor.org — Agora reverse-proxy (runs on the HOST nginx)
# Place this file in /etc/nginx/sites-available/taraaz.jomhoor.org
# Then:  ln -s /etc/nginx/sites-available/taraaz.jomhoor.org /etc/nginx/sites-enabled/
# ------------------------------------------------------------------

# Detect social-media crawlers for OG preview routing
map $http_user_agent $is_og_bot {
    default                     0;
    ~*facebookexternalhit       1;
    ~*Twitterbot                1;
    ~*LinkedInBot               1;
    ~*WhatsApp                  1;
    ~*TelegramBot               1;
    ~*Slackbot                  1;
    ~*Discordbot                1;
    ~*Googlebot                 1;
    ~*bingbot                   1;
}

# HTTP → HTTPS redirect + ACME challenge
server {
    listen 80;
    listen [::]:80;
    server_name taraaz.jomhoor.org www.taraaz.jomhoor.org;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://taraaz.jomhoor.org$request_uri;
    }
}

# www → apex redirect
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name www.taraaz.jomhoor.org;

    ssl_certificate     /etc/letsencrypt/live/taraaz.jomhoor.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taraaz.jomhoor.org/privkey.pem;

    location / {
        return 301 https://taraaz.jomhoor.org$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name taraaz.jomhoor.org;

    ssl_certificate     /etc/letsencrypt/live/taraaz.jomhoor.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taraaz.jomhoor.org/privkey.pem;

    # Verificator (ZK proof verification via Rarimo)
    location /integrations/verificator-svc {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8100;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Backend API
    location /api {
        client_max_body_size 150M;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8180;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Redirect /post/* to /feed/post/*
    location /post/ {
        rewrite ^/post/(.*)$ /feed/post/$1 permanent;
    }

    # OG endpoint — proxied to Fastify API (matched by bot rewrite below)
    location /og/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8180;
        proxy_read_timeout 10s;
        proxy_buffering off;
    }

    # Conversation URLs — route social bots to OG endpoint, users to SPA
    location ~ ^/feed/conversation/([a-zA-Z0-9]+) {
        set $convo_slug $1;

        # Social crawlers get rewritten to the API OG endpoint
        if ($is_og_bot) {
            rewrite ^ /og/conversation/$convo_slug last;
        }

        # Regular users get the SPA
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8190/conversation/$convo_slug$is_args$args;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # SvelteKit app served under /feed/
    location = /feed {
        return 302 /feed/;
    }

    location /feed/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8190/;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Root — redirect to /feed/
    location / {
        return 302 /feed/;
    }

    # Health check
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
