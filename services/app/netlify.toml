[build]
command = "pnpm build"
publish = "build"
ignore = 'if [ "$CONTEXT" = "production" ]; then git diff --quiet "$COMMIT_REF^" "$COMMIT_REF" -- .; else test -n "$CACHED_COMMIT_REF" && git diff --quiet "$CACHED_COMMIT_REF" "$COMMIT_REF" -- .; fi'

[build.environment]
NODE_VERSION = "24"

# Preserve old blog URLs after resources replaced the blog section.
[[redirects]]
from = "/blog"
to = "/resources"
status = 301
force = true

[[redirects]]
from = "/blog/*"
to = "/resources/:splat"
status = 301
force = true

