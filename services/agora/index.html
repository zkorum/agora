<!doctype html>
<html>
  <head>
    <title><%= productName %></title>

    <meta charset="utf-8" />
    <meta name="description" content="<%= productDescription %>" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="<%= productName %>" />
    <meta property="og:description" content="<%= productDescription %>" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:site_name" content="<%= productName %>" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="<%= productName %>" />
    <meta name="twitter:description" content="<%= productDescription %>" />
    <meta name="twitter:image" content="/og-image.png" />
    <meta
      name="viewport"
      content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width, interactive-widget=resizes-content<% if (ctx.mode.cordova || ctx.mode.capacitor) { %>, viewport-fit=cover<% } %>"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="128x128"
      href="icons/favicon-128x128.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="icons/favicon-96x96.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="icons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="icons/favicon-16x16.png"
    />
    <link rel="icon" type="image/ico" href="favicon.ico" />
    <!-- Privacy-friendly analytics by Plausible -->
    <script
      async
      src="https://plausible.io/js/pa-6dsPzZJSXW55Io0bOSu7E.js"
    ></script>
    <script>
      ((window.plausible =
        window.plausible ||
        function () {
          (plausible.q = plausible.q || []).push(arguments);
        }),
        (plausible.init =
          plausible.init ||
          function (i) {
            plausible.o = i || {};
          }));
      plausible.init();
    </script>
    <!-- Auto-reload on stale chunk after deployment -->
    <script>
      window.addEventListener('unhandledrejection', function (event) {
        var reason = event.reason;
        if (
          reason &&
          reason.message &&
          (reason.message.indexOf(
            'Failed to fetch dynamically imported module'
          ) !== -1 ||
            reason.message.indexOf('Loading chunk') !== -1 ||
            reason.message.indexOf('Loading CSS chunk') !== -1 ||
            reason.message.indexOf('Unable to preload CSS') !== -1)
        ) {
          var key = 'chunk-reload';
          var last = sessionStorage.getItem(key);
          var now = Date.now();
          if (last && now - Number(last) < 10000) return;
          sessionStorage.setItem(key, String(now));
          window.location.reload();
        }
      });
    </script>
  </head>

  <body>
    <!-- quasar:entry-point -->
  </body>
</html>
